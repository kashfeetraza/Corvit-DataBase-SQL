<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fast Food Checkout</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#e9ecef;
}

.receipt{
    max-width:450px;
    margin:auto;
    margin-top:80px;
}
</style>

</head>

<body>

<div class="container">
    
    <div class="card receipt shadow">
        
        <div class="card-header text-center fw-bold">
            Fast Food Checkout
        </div>

        <div class="card-body">

            <div class="mb-3">
                <label class="form-label">
                    How many Zinger Burgers? (Rs. 500 each)
                </label>
                <input type="number" id="burger" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    How many Fries? (Rs. 200 each)
                </label>
                <input type="number" id="fries" class="form-control">
            </div>

            <div class="d-grid">
                <button class="btn btn-primary" onclick="calculateBill()">
                    Calculate Total
                </button>
            </div>

            <hr>

            <div id="result" class="fw-bold text-center"></div>

        </div>

    </div>

</div>

<script>

function calculateBill(){

    let burgers = Number(document.getElementById("burger").value);
    let fries = Number(document.getElementById("fries").value);
    let result = document.getElementById("result");

    // Validation
    if(isNaN(burgers) || isNaN(fries) || burgers < 0 || fries < 0){
        result.innerHTML = "❌ Please enter valid quantities.";
        result.className = "text-danger text-center fw-bold";
        return;
    }

    // Price calculation
    let total = (burgers * 500) + (fries * 200);

    result.innerHTML = "Your total bill is Rs. " + total;
    result.className = "text-success text-center fw-bold";

}

</script>

</body>
</html>
